services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: undergraduate-assistant-backend-prod
    ports:
      - "8000:8000"
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - DEBUG=false
      - UVICORN_WORKERS=1
      - ENABLE_SCHEDULER=true
      - SCRAPER_INTERVAL_HOURS=${SCRAPER_INTERVAL_HOURS:-168}
      - SCRAPER_POLL_SECONDS=${SCRAPER_POLL_SECONDS:-60}
      - SCRAPER_ADMIN_TOKEN=${SCRAPER_ADMIN_TOKEN:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend/data:/app/backend/data
    networks:
      - undergraduate-assistant-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    container_name: undergraduate-assistant-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - undergraduate-assistant-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  backend_data:
    driver: local

networks:
  undergraduate-assistant-network:
    driver: bridge