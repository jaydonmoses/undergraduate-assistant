services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: undergraduate-assistant-backend
    ports:
      - "8000:8000"
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - DEBUG=false
      - UVICORN_WORKERS=1
      - ENABLE_SCHEDULER=true
      - SCRAPER_INTERVAL_HOURS=168
      - SCRAPER_POLL_SECONDS=60
      - SCRAPER_ADMIN_TOKEN=${SCRAPER_ADMIN_TOKEN:-}
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - backend_data:/app/backend/data
    networks:
      - undergraduate-assistant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: undergraduate-assistant-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - undergraduate-assistant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend_data:
    driver: local

networks:
  undergraduate-assistant-network:
    driver: bridge